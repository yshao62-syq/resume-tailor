<!doctype html>
<html lang="zh"><head><meta charset="utf-8">
<!-- resume-tailor 模板：Claude 把下面的占位内容替换成定稿简历，另存为 resume.html，
     再跑 render.py 出 PDF。CSS 不要动（A4 WYSIWYG、Maple Mono、蓝色下划线分节）。 -->
<style>
@page { size: A4; margin: 13mm 16mm 12mm 16mm; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Maple Mono NF CN","Maple Mono",monospace; color:#1f2328; font-size:10.5px; line-height:1.45; }
.page { width:210mm; min-height:297mm; margin:0 auto; padding:13mm 16mm 12mm 16mm; background:#fff; }
.header { text-align:center; margin-bottom:6px; }
.name { font-size:24px; font-weight:700; letter-spacing:3px; }
.target { font-size:11.5px; color:#2c5aa0; font-weight:600; margin-top:3px; }
.contact { font-size:10px; color:#666; margin-top:4px; }
.positioning { margin:5px 0 3px; padding:5px 9px; background:#f3f6fb; border-left:3px solid #2c5aa0; font-size:10.5px; font-weight:500; color:#2b3340; line-height:1.45; }
.section-title { color:#2c5aa0; font-size:12.5px; font-weight:700; border-bottom:1.5px solid #2c5aa0; padding-bottom:2px; margin:6px 0 2px; letter-spacing:1px; }
.co-line { display:flex; justify-content:space-between; align-items:baseline; margin-top:3px; }
.co { font-weight:700; font-size:11.5px; }
.dates { font-size:10px; color:#999; }
.subtitle { font-weight:700; font-size:11px; color:#2c5aa0; margin:3px 0 1px; }
ul { padding-left:15px; margin-top:1px; }
li { font-size:10.5px; margin-bottom:0; line-height:1.35; }
li b { color:#1f2328; }
.edu-row { display:flex; justify-content:space-between; font-size:11px; margin-bottom:2px; }
.edu-school { font-weight:700; }
.edu-date { color:#999; font-size:10px; }
@media screen { body { background:#eef1f5; padding:24px 0; } }
@media print { body{background:#fff;padding:0;} .page{width:auto;min-height:0;padding:0;} }
</style></head>
<body>
<div class="page">

  <!-- ===== 头部 ===== -->
  <div class="header">
    <div class="name">候选人姓名</div>
    <div class="target">意向岗位：xxx</div>
    <div class="contact">电话：xxx（微信同号）　｜　邮箱：xxx　｜　意向 base：xxx</div>
  </div>

  <!-- ===== 一句话定位（Phase 2 推断 + 确认的那条主线）===== -->
  <div class="positioning">定位：xxx</div>

  <!-- ===== 个人项目（按主线，命中 JD 的放前）===== -->
  <div class="section-title">个人项目</div>
  <div>
    <div class="subtitle">项目名（时间）</div>
    <ul>
      <li><b>引导词：</b>这条 bullet 的展开。每条都"加粗引导词 + 展开"。</li>
      <li><b>技术栈：</b>xxx</li>
    </ul>
  </div>

  <!-- ===== 工作经历（heavy 重点写 / light 一句带过 / drop 删掉不写）===== -->
  <div class="section-title">工作经历</div>
  <div>
    <div class="co-line"><span class="co">公司 · 职位</span><span class="dates">时间</span></div>
    <div class="subtitle">年份 · 主题</div>
    <ul>
      <li><b>引导词：</b>bullet 展开，只能用这段经历的事实。</li>
    </ul>
  </div>

  <!-- ===== 教育背景 ===== -->
  <div class="section-title">教育背景</div>
  <div class="edu-row"><span><b>学校</b> · 专业 · 学位</span><span class="edu-date">时间</span></div>

</div>
</body></html>
